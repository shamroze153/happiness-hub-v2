<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Track Order — Happiness Hub</title>
<link rel="stylesheet" href="styles/main.css">
<style>
.track-page{max-width:660px;margin:60px auto;padding:0 24px;}
.progress-wrap{display:flex;justify-content:space-between;position:relative;margin:24px 0;}
.progress-wrap::before{content:'';position:absolute;top:16px;left:12%;right:12%;height:2px;background:var(--c-border2);z-index:0;}
.prog-step{display:flex;flex-direction:column;align-items:center;gap:8px;z-index:1;flex:1;}
.prog-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--c-dim);background:var(--c-bg);display:flex;align-items:center;justify-content:center;font-size:14px;transition:.3s;}
.prog-dot.done{background:var(--c-accent);border-color:var(--c-accent);color:#000;}
.prog-dot.active{background:var(--c-primary);border-color:var(--c-primary);box-shadow:0 0 16px rgba(124,106,255,.5);}
.prog-dot.error{background:#ff4757;border-color:#ff4757;}
.prog-lbl{font-size:11px;color:var(--c-muted);text-align:center;line-height:1.3;}
.prog-lbl.active{color:var(--c-primary);font-weight:600;}
.detail-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--c-border2);font-size:14px;}
.detail-row:last-child{border:none;}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><div class="logo-box">😊</div>Happiness<span>Hub</span></a>
    <div class="nav-links"><a href="index.html">Deals</a><a href="track.html" class="active">Track</a></div>
  </div>
</nav>

<div class="track-page">
  <div class="text-center mb-24 slide-up">
    <h1 style="margin-bottom:12px;">📦 Track Your Order</h1>
    <p>Enter your WhatsApp number or Order ID to see your cashback status.</p>
  </div>

  <div class="card slide-up">
    <div class="row-2" style="align-items:flex-end;gap:12px;">
      <div class="form-group" style="margin:0;flex:0 0 180px;">
        <label class="form-label">Search By</label>
        <select id="method" class="form-control" onchange="updatePH()">
          <option value="whatsapp">📱 WhatsApp</option>
          <option value="order_id">🔢 Order ID</option>
        </select>
      </div>
      <div class="form-group" style="margin:0;flex:1;">
        <label class="form-label">Your Number / ID</label>
        <input type="text" id="trackInput" class="form-control" placeholder="Enter WhatsApp number" autocomplete="off" onkeydown="if(event.key==='Enter')track()">
      </div>
      <button onclick="track()" class="btn btn-primary" id="trackBtn" style="flex-shrink:0;padding:12px 20px;">🔍 Track</button>
    </div>
  </div>

  <div id="results"></div>
</div>

<footer class="footer"><p>© <span id="yr"></span> Happiness Hub</p></footer>

<script src="lib/hh.js"></script>
<script>
(function(){const c=document.getElementById("particles"),ctx=c.getContext("2d");function r(){c.width=innerWidth;c.height=innerHeight;}r();window.addEventListener("resize",r);const pts=Array.from({length:40},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.5,a:Math.random()*.3+.05}));function draw(){ctx.clearRect(0,0,c.width,c.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>c.width)p.vx*=-1;if(p.y<0||p.y>c.height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(124,106,255,${p.a})`;ctx.fill();});requestAnimationFrame(draw);}draw();})();

document.getElementById("yr").textContent=new Date().getFullYear();
function updatePH(){document.getElementById("trackInput").placeholder=document.getElementById("method").value==="whatsapp"?"Enter WhatsApp number":"Enter Order ID or Amazon Order ID";}

const up=new URLSearchParams(location.search);
if(up.get("order_id")){document.getElementById("method").value="order_id";updatePH();document.getElementById("trackInput").value=up.get("order_id");track();}
else if(up.get("whatsapp")){document.getElementById("trackInput").value=up.get("whatsapp");track();}

const STEPS=[{key:"Pending",icon:"⏳",label:"Submitted"},{key:"Ordered",icon:"🛒",label:"Ordered"},{key:"Delivered",icon:"📦",label:"Delivered"},{key:"Cashback Sent",icon:"💸",label:"Cashback\nSent"}];
const ERR_ST=["Rejected","Need More Info","PayPal Issue"];

async function track(){
  const method=document.getElementById("method").value;
  const val=document.getElementById("trackInput").value.trim();
  const btn=document.getElementById("trackBtn");
  if(!val){HH.toast("Please enter a value","error");return;}
  btn.disabled=true;btn.textContent="Searching...";
  document.getElementById("results").innerHTML=`<div class="flex-center" style="padding:40px;gap:12px;"><div class="spinner"></div><span style="color:var(--c-muted);">Searching orders...</span></div>`;
  const params=method==="whatsapp"?{whatsapp:val}:{order_id:val};
  const res=await HH.get("trackOrder",params);
  btn.disabled=false;btn.textContent="🔍 Track";
  if(!res.success){document.getElementById("results").innerHTML=`<div class="card mt-16 text-center" style="padding:40px;"><div style="font-size:48px;margin-bottom:16px;">🔎</div><h3>No orders found</h3><p>${HH.esc(res.error||"No orders match.")}</p></div>`;return;}
  document.getElementById("results").innerHTML=`<div style="margin-top:8px;"><p style="font-size:13px;color:var(--c-muted);margin-bottom:12px;">Found ${res.orders.length} order${res.orders.length!==1?"s":""}</p>${res.orders.map(renderOrder).join("")}</div>`;
}

function renderOrder(o){
  const si=STEPS.findIndex(s=>s.key===o.status);
  const isErr=ERR_ST.includes(o.status);
  const steps=STEPS.map((s,i)=>{
    let cls="";
    if(!isErr&&i<si) cls="done";
    else if(!isErr&&i===si) cls="active";
    else if(isErr&&i<si) cls="done";
    return `<div class="prog-step"><div class="prog-dot ${cls}">${s.icon}</div><div class="prog-lbl ${cls===_?"active":""}${i===si&&!isErr?"active":""}">${s.label}</div></div>`;
  }).join("");
  const _="active";
  const errBanner=isErr?`<div style="background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.2);border-radius:var(--r-md);padding:12px 14px;margin:12px 0;"><div style="font-weight:600;color:#ff4757;">${HH.esc(o.status)}</div>${o.seller_notes?`<div style="font-size:13px;color:var(--c-muted);margin-top:4px;">${HH.esc(o.seller_notes)}</div>`:""}</div>`:"";
  const proofBanner=o.status==="Cashback Sent"&&o.cashback_proof_url?`<div style="background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.2);border-radius:var(--r-md);padding:12px 14px;margin:12px 0;"><div style="font-weight:600;color:var(--c-accent);margin-bottom:8px;">💸 Cashback Sent!</div><a href="${HH.esc(o.cashback_proof_url)}" target="_blank" class="btn btn-ghost btn-sm">View Proof</a></div>`:"";
  const notesBanner=o.seller_notes&&!isErr?`<div style="background:rgba(255,255,255,.03);border:1px solid var(--c-border2);border-radius:var(--r-md);padding:10px 14px;margin:12px 0;font-size:13px;color:var(--c-muted);">💬 ${HH.esc(o.seller_notes)}</div>`:"";
  return `<div class="card slide-up" style="margin-bottom:16px;">
    <div class="flex-between" style="margin-bottom:16px;">
      <div><div style="font-size:12px;color:var(--c-muted);">Order</div><div style="font-weight:700;font-size:15px;">${HH.esc(o.order_id)}</div></div>
      ${HH.statusBadge(o.status)}
    </div>
    <div class="progress-wrap">${STEPS.map((s,i)=>{let cls="";if(!isErr&&i<si)cls="done";else if(!isErr&&i===si)cls="active";return `<div class="prog-step"><div class="prog-dot ${cls}">${s.icon}</div><div class="prog-lbl ${!isErr&&i===si?"active":""}">${s.label}</div></div>`;}).join("")}</div>
    ${errBanner}${proofBanner}${notesBanner}
    <div>
      <div class="detail-row"><span style="color:var(--c-muted);">Product</span><span style="font-weight:500;max-width:200px;text-align:right;">${HH.esc(o.product_title)}</span></div>
      <div class="detail-row"><span style="color:var(--c-muted);">Amazon Order ID</span><span style="font-family:monospace;font-size:13px;">${HH.esc(o.amazon_order_id)}</span></div>
      <div class="detail-row"><span style="color:var(--c-muted);">Cashback</span><span style="color:var(--c-primary);font-weight:700;">${HH.fmt$(o.cashback_amount)}</span></div>
      <div class="detail-row"><span style="color:var(--c-muted);">Submitted</span><span>${HH.timeAgo(o.submitted_at)}</span></div>
      <div class="detail-row"><span style="color:var(--c-muted);">Last Update</span><span>${HH.timeAgo(o.updated_at)}</span></div>
    </div>
  </div>`;
}
</script>
</body>
</html>
