<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Seller Dashboard — Happiness Hub</title>
<link rel="stylesheet" href="styles/main.css">
<style>.page{max-width:1100px;margin:0 auto;padding:28px 24px;}</style>
</head>
<body>
<canvas id="particles"></canvas>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><div class="logo-box">😊</div>Happiness<span>Hub</span></a>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="storeName" style="font-size:14px;color:var(--c-muted);"></span>
      <button onclick="logout()" class="btn btn-ghost btn-sm">Sign Out</button>
    </div>
  </div>
</nav>

<div class="page">
  <div class="flex-between mb-24">
    <div><h2 style="margin-bottom:4px;">🏪 Seller Dashboard</h2><p>View and update your orders</p></div>
    <button onclick="loadOrders()" class="btn btn-ghost btn-sm">🔄 Refresh</button>
  </div>

  <div class="grid-4 mb-24" style="grid-template-columns:repeat(5,1fr);">
    <div class="stat-card"><div class="stat-icon">📋</div><div><div class="stat-val" id="sTotal">0</div><div class="stat-lbl">Total</div></div></div>
    <div class="stat-card"><div class="stat-icon">⏳</div><div><div class="stat-val" id="sPend">0</div><div class="stat-lbl">Pending</div></div></div>
    <div class="stat-card"><div class="stat-icon">📦</div><div><div class="stat-val" id="sDel">0</div><div class="stat-lbl">Delivered</div></div></div>
    <div class="stat-card"><div class="stat-icon">💸</div><div><div class="stat-val" id="sSent">0</div><div class="stat-lbl">Cashback Sent</div></div></div>
    <div class="stat-card"><div class="stat-icon">❌</div><div><div class="stat-val" id="sRej">0</div><div class="stat-lbl">Rejected</div></div></div>
  </div>

  <div class="flex-between mb-16" style="gap:12px;">
    <div class="search-wrap" style="flex:1;min-width:180px;"><span class="search-icon">🔍</span><input type="text" class="form-control" id="oSearch" placeholder="Search orders..." oninput="filterOrders()"></div>
    <select class="form-control" id="oStatus" onchange="filterOrders()" style="max-width:170px;">
      <option value="">All Statuses</option>
      <option>Pending</option><option>Ordered</option><option>Delivered</option>
      <option>Cashback Sent</option><option>Rejected</option><option>Need More Info</option><option>PayPal Issue</option>
    </select>
  </div>
  <div class="tbl-wrap" id="ordersTbl"><div class="flex-center" style="padding:60px;"><div class="spinner"></div></div></div>
</div>

<!-- Update Modal -->
<div class="modal-overlay" id="modal" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr">
      <h3>Update Order</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalInfo" style="margin-bottom:20px;"></div>
    <div class="form-group"><label class="form-label">New Status</label>
      <select id="newStatus" class="form-control">
        <option value="">— Keep current —</option>
        <option>Pending</option><option>Ordered</option><option>Delivered</option>
        <option>Cashback Sent</option><option>Rejected</option><option>Need More Info</option><option>PayPal Issue</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Note for Buyer</label><textarea id="sellerNote" class="form-control" rows="2" placeholder="Visible in buyer's tracking page..."></textarea></div>
    <div class="form-group">
      <label class="form-label">Cashback Proof URL</label>
      <input type="text" id="proofUrl" class="form-control" placeholder="Paste PayPal screenshot link or upload below">
      <label class="btn btn-ghost btn-sm" style="cursor:pointer;margin-top:8px;display:inline-flex;">
        📎 Upload Proof <input type="file" id="proofFile" accept="image/*" style="display:none;" onchange="uploadProof()">
      </label>
      <div id="proofStatus" style="font-size:12px;color:var(--c-muted);margin-top:4px;"></div>
    </div>
    <div id="updateErr" class="err-box" style="display:none;"></div>
    <div style="display:flex;gap:12px;">
      <button onclick="saveUpdate()" class="btn btn-primary" id="saveBtn">Save Changes</button>
      <button onclick="closeModal()" class="btn btn-ghost">Cancel</button>
    </div>
  </div>
</div>

<script src="lib/hh.js"></script>
<script>
(function(){const c=document.getElementById("particles"),ctx=c.getContext("2d");function r(){c.width=innerWidth;c.height=innerHeight;}r();window.addEventListener("resize",r);const pts=Array.from({length:30},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.5,a:Math.random()*.15+.05}));function draw(){ctx.clearRect(0,0,c.width,c.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>c.width)p.vx*=-1;if(p.y<0||p.y>c.height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(0,229,160,${p.a})`;ctx.fill();});requestAnimationFrame(draw);}draw();})();

let session=null,allOrders=[],currentOrderId=null;

document.addEventListener("DOMContentLoaded",async()=>{
  session=HH.requireAuth("seller","seller-login.html");
  if(!session)return;
  document.getElementById("storeName").textContent=session.store_name||session.name||"";
  await loadOrders();
});

async function loadOrders(){
  document.getElementById("ordersTbl").innerHTML=`<div class="flex-center" style="padding:60px;"><div class="spinner"></div></div>`;
  const auth=HH.getAuthBody("seller");
  const res=await HH.get("getSellerOrders",auth);
  if(!res.success){document.getElementById("ordersTbl").innerHTML=`<div class="empty-state"><p style="color:#ff4757;">${HH.esc(res.error)}</p></div>`;return;}
  allOrders=res.orders||[];
  const s=res.stats||{};
  document.getElementById("sTotal").textContent=s.total||0;
  document.getElementById("sPend").textContent=s.pending||0;
  document.getElementById("sDel").textContent=s.delivered||0;
  document.getElementById("sSent").textContent=s.cashback_sent||0;
  document.getElementById("sRej").textContent=s.rejected||0;
  renderOrders(allOrders);
}

function filterOrders(){
  const q=(document.getElementById("oSearch").value||"").toLowerCase();
  const st=document.getElementById("oStatus").value;
  let f=allOrders;
  if(st)f=f.filter(o=>o.status===st);
  if(q)f=f.filter(o=>(o.buyer_name||"").toLowerCase().includes(q)||(o.product_title||"").toLowerCase().includes(q)||(o.order_id||"").toLowerCase().includes(q)||(o.amazon_order_id||"").toLowerCase().includes(q)||(o.buyer_whatsapp||"").includes(q));
  renderOrders(f);
}

function renderOrders(orders){
  if(!orders.length){document.getElementById("ordersTbl").innerHTML=`<div class="empty-state"><div class="icon">📋</div><p>No orders found.</p></div>`;return;}
  document.getElementById("ordersTbl").innerHTML=`<table><thead><tr><th>Buyer</th><th>Product</th><th>Order ID</th><th>Cashback</th><th>Status</th><th>Submitted</th><th></th></tr></thead><tbody>${orders.map(o=>`<tr><td><div style="font-weight:500;">${HH.esc(o.buyer_name)}</div><div style="font-size:11px;color:var(--c-muted);">${HH.esc(o.buyer_whatsapp)}</div></td><td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;">${HH.esc(o.product_title)}</td><td style="font-family:monospace;font-size:12px;color:var(--c-muted);">${HH.esc(o.amazon_order_id)}</td><td style="color:var(--c-primary);font-weight:600;">${HH.fmt$(o.cashback_amount)}</td><td>${HH.statusBadge(o.status)}</td><td style="font-size:12px;color:var(--c-muted);">${HH.timeAgo(o.submitted_at)}</td><td><button onclick="openModal('${HH.esc(o.order_id)}')" class="btn btn-ghost btn-sm">Update</button></td></tr>`).join("")}</tbody></table>`;
}

function openModal(oid){
  const o=allOrders.find(x=>x.order_id===oid);if(!o)return;
  currentOrderId=oid;
  document.getElementById("newStatus").value="";
  document.getElementById("sellerNote").value=o.seller_notes||"";
  document.getElementById("proofUrl").value=o.cashback_proof_url||"";
  document.getElementById("updateErr").style.display="none";
  document.getElementById("proofStatus").textContent="";
  document.getElementById("modalInfo").innerHTML=`<div style="background:rgba(124,106,255,.06);border:1px solid var(--c-border);border-radius:var(--r-md);padding:14px;font-size:14px;"><div><strong>${HH.esc(o.buyer_name)}</strong> · ${HH.esc(o.buyer_whatsapp)}</div><div style="color:var(--c-muted);margin-top:4px;">${HH.esc(o.product_title)}</div><div style="margin-top:6px;">${HH.statusBadge(o.status)} &nbsp; <span style="color:var(--c-primary);font-weight:700;">${HH.fmt$(o.cashback_amount)}</span></div>${o.payment_method?`<div style="margin-top:6px;font-size:13px;color:var(--c-muted);">💳 Refund via <strong style="color:var(--c-text);">${HH.esc(o.payment_method)}</strong>: ${HH.esc(o.payment_id||"")}</div>`:""}<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">${o.screenshot_url?`<a href="${HH.esc(o.screenshot_url)}" target="_blank" class="btn btn-ghost btn-sm">📎 Order SS</a>`:""}${o.delivery_screenshot_url?`<a href="${HH.esc(o.delivery_screenshot_url)}" target="_blank" class="btn btn-ghost btn-sm">📦 Delivery SS</a>`:`<span style="font-size:12px;color:var(--c-muted);align-self:center;">⏳ No delivery proof yet</span>`}</div></div>`;
  document.getElementById("modal").style.display="flex";
  document.body.style.overflow="hidden";
}

function closeModal(){document.getElementById("modal").style.display="none";document.body.style.overflow="";}

async function uploadProof(){
  const file=document.getElementById("proofFile").files[0];if(!file)return;
  const s=document.getElementById("proofStatus");s.textContent="Uploading...";
  try{const url=await HH.uploadFile(file);document.getElementById("proofUrl").value=url;s.textContent="✅ Uploaded";s.style.color="var(--c-accent)";}
  catch(e){s.textContent="❌ "+e.message;s.style.color="#ff4757";}
}

async function saveUpdate(){
  const btn=document.getElementById("saveBtn"),err=document.getElementById("updateErr");
  err.style.display="none";
  const status=document.getElementById("newStatus").value;
  const seller_notes=document.getElementById("sellerNote").value.trim();
  const cashback_proof_url=document.getElementById("proofUrl").value.trim();
  if(!status&&!seller_notes&&!cashback_proof_url){err.textContent="Make at least one change.";err.style.display="block";return;}
  btn.disabled=true;btn.textContent="Saving...";
  const auth=HH.getAuthBody("seller");
  const params={...auth,order_id:currentOrderId};
  if(status)params.status=status;
  if(seller_notes)params.seller_notes=seller_notes;
  if(cashback_proof_url)params.cashback_proof_url=cashback_proof_url;
  const res=await HH.get("updateOrderStatus",params);
  btn.disabled=false;btn.textContent="Save Changes";
  if(res.success){HH.toast("Order updated!","success");closeModal();await loadOrders();}
  else{err.textContent=res.error||"Update failed.";err.style.display="block";}
}

document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
function logout(){HH.clearSession("seller");location.href="seller-login.html";}
</script>
</body>
</html>
